<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Agrupamento com Espelhamento Horizontal (Flip X) -->
  <g transform="scale(-1, 1) translate(-200, 0)">
    
    <!-- Linhas de velocidade (Speedlines) -->
    <!-- Efeito de vento ou velocidade do pneu -->
    <line x1="120" y1="40" x2="195" y2="40" stroke="#004d4d" stroke-width="6" stroke-linecap="round"/>
    <line x1="120" y1="80" x2="185" y2="80" stroke="#004d4d" stroke-width="6" stroke-linecap="round"/>
    <line x1="120" y1="120" x2="190" y2="120" stroke="#004d4d" stroke-width="6" stroke-linecap="round"/>
    <line x1="120" y1="160" x2="175" y2="160" stroke="#004d4d" stroke-width="6" stroke-linecap="round"/>

    <!-- Pneu 3D (Cilindro Isométrico Perfeitamente Arredondado) -->
    
    <!-- Fundo do Pneu (Elipse Menor na parte de trás) -->
    <ellipse cx="65" cy="100" rx="35" ry="80" fill="#008080" />
    
    <!-- Corpo/Banda de rodagem (Retângulo central que conecta e fecha o 3D) -->
    <rect x="65" y="20" width="50" height="160" fill="#008080" />
    
    <!-- Detalhe de sombra volumétrica para dar a sensação circular da banda de rodagem -->
    <rect x="65" y="20" width="20" height="160" fill="#006666" />

    <!-- Face Frontal do Pneu (Elipse Maior na frente) -->
    <!-- Essa é a lateral que o usuário visualiza como a roda -->
    <ellipse cx="115" cy="100" rx="35" ry="80" fill="#004d4d" />
    
    <!-- Aro Prateado / Furo Metálico da Roda -->
    <ellipse cx="115" cy="100" rx="18" ry="45" fill="#f4f6f8" />
    <!-- Sombra interna do furo (sensação de profundidade tridimensional no pneu) -->
    <ellipse cx="110" cy="100" rx="10" ry="25" fill="#cbd5e1" />
    <!-- Miolo / Eixo escuro -->
    <ellipse cx="115" cy="100" rx="6" ry="15" fill="#004d4d" />

    <!-- Ranhuras de tração (Borrifos de pneu em V / Chevron realistas) -->
    <path d="M 65 30 L 85 40 L 105 30 
             M 65 60 L 85 70 L 105 60 
             M 65 90 L 85 100 L 105 90 
             M 65 120 L 85 130 L 105 120 
             M 65 150 L 85 160 L 105 150" 
          stroke="#004d4d" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Badge Adicional (Novo padrão Vermelho CPS) 
         Após o flip, o x:110 será o x:90 real na tela (pois 200 - 110 = 90). -->
    <rect x="100" y="110" width="70" height="70" rx="16" fill="#cc0000" stroke="#ffffff" stroke-width="6"/>
    
    <!-- Sinal de Mais (Centro do X=135 Y=145) -->
    <!-- Símbolo espelhado continua o mesmo na visualização final, mantendo coerência -->
    <line x1="135" y1="125" x2="135" y2="165" stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>
    <line x1="115" y1="145" x2="155" y2="145" stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>
    
  </g>
</svg>
